name: 功能建议
description: 提议可验证、符合项目边界的改进
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        请聚焦软件能力、可靠性、文档或研究工具。项目不提供自动交易、券商连接、收益承诺或个股推荐。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue 和路线图，确认没有重复建议。
          required: true
        - label: 建议不要求收集用户真实持仓或交易记录。
          required: true
        - label: 建议不把规则信号描述为确定性价格预测或收益承诺。
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请先描述使用场景和现有困难，而不是只描述实现方式。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 可验证的完成标准
      description: 说明维护者如何判断该功能已经正确完成。
    validations:
      required: true

  - type: textarea
    id: rule-evidence
    attributes:
      label: 规则来源与样本（涉及裁断规则时必填）
      description: 提供可公开的来源、正反样本、边界条件和预期结果。

  - type: textarea
    id: risks
    attributes:
      label: 数据、安全与兼容性影响
      description: 说明第三方数据、隐私、性能、部署或已有规则可能受到的影响。

  - type: dropdown
    id: contribution
    attributes:
      label: 是否愿意参与实现？
      options:
        - 是，我愿意提交 Pull Request
        - 可以协助测试或提供样本
        - 暂时只能提出建议
    validations:
      required: true

