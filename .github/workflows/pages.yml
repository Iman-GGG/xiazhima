name: GitHub Pages static snapshot

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Start local server
        run: |
          DEPLOY_RUN_PORT=5000 pnpm start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 12

      - name: Generate static snapshot
        run: BASE_URL=http://localhost:5000 node ./scripts/export-snapshot.js

      - name: Stop local server
        run: kill ${{ env.SERVER_PID }} || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/deploy-pages@v1
